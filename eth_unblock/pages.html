<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insignia</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #09090b;
      --surface: #111114;
      --surface-2: #18181b;
      --border: #27272a;
      --border-active: #3f3f46;
      --text: #fafafa;
      --text-muted: #71717a;
      --text-dim: #52525b;
      --accent: #22d3ee;
      --accent-glow: rgba(34, 211, 238, 0.15);
      --green: #34d399;
      --green-glow: rgba(52, 211, 153, 0.15);
      --amber: #fbbf24;
      --amber-glow: rgba(251, 191, 36, 0.1);
      --red: #f87171;
      --purple: #a78bfa;
    }

    body {
      font-family: 'Bai Jamjuree', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(9, 9, 11, 0.85);
    }

    .logo {
      font-weight: 600;
      font-size: 20px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .back-link:hover { color: var(--text); background: var(--surface-2); }

    /* Page container */
    .page-container {
      flex: 1;
      padding: 32px 40px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    /* ==================== MODEL DETAIL ==================== */
    .model-detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .model-detail-header h1 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -1px;
    }

    .model-rank-badge {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .model-rank-badge.gold {
      background: rgba(251, 191, 36, 0.15);
      border-color: rgba(251, 191, 36, 0.3);
      color: var(--amber);
    }

    .asset-pill {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 400;
    }

    .asset-pill.crypto { background: rgba(251, 191, 36, 0.12); color: var(--amber); }
    .asset-pill.forex { background: rgba(167, 139, 250, 0.12); color: var(--purple); }
    .asset-pill.equities { background: rgba(34, 211, 238, 0.12); color: var(--accent); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(52, 211, 153, 0.12);
      color: var(--green);
      font-size: 13px;
      font-weight: 400;
      margin-left: auto;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .model-detail-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
    }

    /* Stat grid (6 items) */
    .stats-grid-6 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .stat-card label {
      display: block;
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-value.green { color: var(--green); }
    .stat-value.accent { color: var(--accent); }
    .stat-value.purple { color: var(--purple); }
    .stat-value.amber { color: var(--amber); }
    .stat-value.red { color: var(--red); }

    /* Chart */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .chart-card h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chart-tabs { display: flex; gap: 4px; }

    .chart-tab {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 400;
      color: var(--text-dim);
      cursor: pointer;
      border: none;
      background: none;
      transition: all 0.2s;
      font-family: 'Bai Jamjuree', sans-serif;
    }

    .chart-tab.active {
      background: var(--accent-glow);
      color: var(--accent);
    }

    .chart-area { height: 220px; position: relative; overflow: hidden; }
    .chart-svg { width: 100%; height: 100%; }

    .chart-line {
      fill: none;
      stroke: var(--green);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chart-gradient { opacity: 0.15; }

    .chart-grid-line {
      stroke: var(--border);
      stroke-width: 0.5;
      stroke-dasharray: 4 4;
    }

    .chart-label {
      fill: var(--text-dim);
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Predictions table */
    .predictions-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .predictions-card h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .predictions-table {
      width: 100%;
      border-collapse: collapse;
    }

    .predictions-table th {
      text-align: left;
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 400;
      padding: 0 8px 10px;
      border-bottom: 1px solid var(--border);
    }

    .predictions-table td {
      padding: 12px 8px;
      font-size: 13px;
      border-bottom: 1px solid rgba(39, 39, 42, 0.5);
    }

    .predictions-table tr:last-child td { border-bottom: none; }

    .predictions-table .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .direction-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .direction-pill.long {
      background: rgba(52, 211, 153, 0.15);
      color: var(--green);
    }

    .direction-pill.short {
      background: rgba(248, 113, 113, 0.15);
      color: var(--red);
    }

    .result-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
    }

    .result-pill.win {
      background: rgba(52, 211, 153, 0.12);
      color: var(--green);
    }

    .result-pill.loss {
      background: rgba(248, 113, 113, 0.12);
      color: var(--red);
    }

    /* Sidebar */
    .model-sidebar { display: flex; flex-direction: column; gap: 16px; }

    .sidebar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .sidebar-card h3 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .creator-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border-radius: 12px;
      background: var(--surface-2);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: var(--text);
    }

    .creator-card:hover { background: var(--border); }

    .creator-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .creator-avatar.researcher {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.25), rgba(167, 139, 250, 0.2));
      color: var(--accent);
    }

    .creator-avatar.trader {
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.25), rgba(251, 191, 36, 0.15));
      color: var(--green);
    }

    .creator-info { flex: 1; min-width: 0; }

    .creator-info .name {
      font-size: 14px;
      font-weight: 500;
    }

    .creator-info .role {
      font-size: 12px;
      color: var(--text-muted);
    }

    .creator-arrow {
      font-size: 16px;
      color: var(--text-dim);
      transition: transform 0.2s;
    }

    .creator-card:hover .creator-arrow { transform: translateX(3px); }

    .sidebar-meta {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .sidebar-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .sidebar-meta-row .label { color: var(--text-dim); }

    .sidebar-meta-row .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .btn-primary {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--green), #10b981);
      color: var(--bg);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Bai Jamjuree', sans-serif;
      text-decoration: none;
    }

    .btn-primary:hover { transform: translateY(-1px); opacity: 0.95; }

    /* ==================== PROFILE ==================== */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .profile-avatar.researcher {
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.25), rgba(167, 139, 250, 0.2));
      color: var(--accent);
    }

    .profile-avatar.trader {
      background: linear-gradient(135deg, rgba(52, 211, 153, 0.25), rgba(251, 191, 36, 0.15));
      color: var(--green);
    }

    .profile-info h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .role-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 4px;
    }

    .role-badge.researcher {
      background: var(--accent-glow);
      color: var(--accent);
    }

    .role-badge.trader {
      background: var(--green-glow);
      color: var(--green);
    }

    .profile-bio {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    .profile-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    /* Stats grid (4 items) */
    .stats-grid-4 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    /* Models list */
    .models-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .model-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-radius: 10px;
      background: var(--surface-2);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: var(--text);
    }

    .model-list-item:hover { background: var(--border); }

    .model-list-name {
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .model-list-stats {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    .model-list-stats .green { color: var(--green); }
    .model-list-stats .accent { color: var(--accent); }

    /* Activity feed */
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .activity-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      font-size: 13px;
    }

    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .activity-dot.green { background: var(--green); }
    .activity-dot.accent { background: var(--accent); }
    .activity-dot.amber { background: var(--amber); }
    .activity-dot.purple { background: var(--purple); }

    .activity-text { color: var(--text-muted); line-height: 1.4; }
    .activity-text strong { color: var(--text); font-weight: 500; }
    .activity-time { color: var(--text-dim); font-size: 11px; margin-top: 2px; }

    /* Responsive */
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .page-container { padding: 24px 20px; }
      .model-detail-layout { grid-template-columns: 1fr; }
      .profile-layout { grid-template-columns: 1fr; }
      .stats-grid-6 { grid-template-columns: repeat(2, 1fr); }
      .model-detail-header h1 { font-size: 24px; }
      .profile-header { flex-direction: column; text-align: center; }
    }
  </style>
</head>

    <div class="model-detail-header" id="md-header"></div>

    <div class="model-detail-layout">
      <div class="model-main">
        <div class="stats-grid-6" id="md-stats"></div>

        <div class="chart-card">
          <h3>
            Performance
            <div class="chart-tabs">
              <button class="chart-tab active">7D</button>
              <button class="chart-tab">30D</button>
              <button class="chart-tab">ALL</button>
            </div>

          <div class="chart-area">
            <svg class="chart-svg" viewBox="0 0 500 200" preserveAspectRatio="none" id="md-chart">
              <defs>
                <linearGradient id="perfGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="var(--green)" stop-opacity="0.25" />
                  <stop offset="100%" stop-color="var(--green)" stop-opacity="0" />
                </linearGradient>
              </defs>
              <line class="chart-grid-line" x1="0" y1="50" x2="500" y2="50" />
              <line class="chart-grid-line" x1="0" y1="100" x2="500" y2="100" />
              <line class="chart-grid-line" x1="0" y1="150" x2="500" y2="150" />
            </svg>
          </div>
        </div>

        <div class="predictions-card">
          <h3>Recent Predictions</h3>
          <table class="predictions-table" id="md-predictions">
            <thead>
              <tr>
                <th>Pair</th>
                <th>Direction</th>
                <th>Entry</th>
                <th>Confidence</th>
                <th>Result</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="model-sidebar">
        <div class="sidebar-card">
          <h3>Creator</h3>
          <div id="md-creator"></div>
          <div class="sidebar-meta" id="md-meta"></div>
        </div>

        <a class="btn-primary" href="index.html#signals" id="md-use-btn">
          Use This Model &rarr;
        </a>
      </div>
    </div>
  </div>
</div>

<!-- ========== SCREEN: Profile ========== -->
<div class="screen" id="screen-profile">
  <nav>
    <a class="logo" href="index.html">
      <div class="logo-icon">I</div>
      Insignia
    </a>
    <a class="back-link" id="profile-back-link" href="index.html">&larr; Back</a>
  </nav>

  <div class="page-container">
    <div class="profile-header" id="pf-header"></div>

    <div class="stats-grid-4" id="pf-stats"></div>

    <div class="profile-layout">
      <div>
        <div class="sidebar-card">
          <h3>Models</h3>
          <div class="models-list" id="pf-models"></div>
        </div>
      </div>

      <div>
        <div class="sidebar-card">
          <h3>Activity</h3>
          <div class="activity-list" id="pf-activity"></div>
        </div>
      </div>
    </div>
  </div>
</div>

  // ==================== ROUTING ====================
  function getParams() {
    var params = new URLSearchParams(window.location.search);
    return {
      page: params.get('page'),
      id: params.get('id'),
      from: params.get('from')
    };
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
  }

  function navigateTo(page, id, from) {
    var url = 'pages.html?page=' + encodeURIComponent(page) + '&id=' + encodeURIComponent(id);
    if (from) url += '&from=' + encodeURIComponent(from);
    window.location.href = url;
  }

  // ==================== MODEL DETAIL ====================
  function showModelDetail(id) {
    var model = MODEL_DATA[id];
    if (!model) { window.location.href = 'index.html'; return; }

    document.title = model.name + ' — Insignia';

    var headerEl = document.getElementById('md-header');
    headerEl.innerHTML =
      '<h1>' + model.name + '</h1>' +
      '<div class="model-rank-badge' + (model.rank === 1 ? ' gold' : '') + '">#' + model.rank + '</div>' +
      '<div class="asset-pill ' + model.asset + '">' + model.assetLabel + '</div>' +
      '<div class="live-badge"><div class="live-dot"></div>Live</div>';

    var statsEl = document.getElementById('md-stats');
    var statItems = [
      { label: 'Accuracy', value: model.accuracy, color: 'green' },
      { label: 'Sharpe Ratio', value: model.sharpe, color: 'accent' },
      { label: 'Win Rate', value: model.winRate, color: 'purple' },
      { label: 'Max Drawdown', value: model.maxDrawdown, color: 'red' },
      { label: 'Total Predictions', value: model.totalPredictions, color: 'accent' },
      { label: 'Avg Confidence', value: model.avgConfidence, color: 'amber' }
    ];
    statsEl.innerHTML = statItems.map(function(s) {
      return '<div class="stat-card"><label>' + s.label + '</label><div class="stat-value ' + s.color + '">' + s.value + '</div></div>';
    }).join('');

    var chartSvg = document.getElementById('md-chart');
    var gradPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    gradPath.setAttribute('class', 'chart-gradient');
    gradPath.setAttribute('d', 'M' + model.chartPoints + ' L500,200 L0,200 Z');
    gradPath.setAttribute('fill', 'url(#perfGrad)');
    chartSvg.appendChild(gradPath);

    var line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    line.setAttribute('class', 'chart-line');
    line.setAttribute('points', model.chartPoints);
    chartSvg.appendChild(line);

    var labels = ['Mar 5', 'Mar 7', 'Mar 9', 'Mar 12'];
    var xPositions = [0, 140, 280, 440];
    labels.forEach(function(lbl, i) {
      var text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('class', 'chart-label');
      text.setAttribute('x', xPositions[i]);
      text.setAttribute('y', 198);
      text.textContent = lbl;
      chartSvg.appendChild(text);
    });

    var tbody = document.querySelector('#md-predictions tbody');
    tbody.innerHTML = model.predictions.map(function(p) {
      return '<tr>' +
        '<td><strong>' + p.pair + '</strong></td>' +
        '<td><span class="direction-pill ' + p.dir + '">' + p.dir.toUpperCase() + '</span></td>' +
        '<td class="mono">' + p.entry + '</td>' +
        '<td class="mono">' + p.conf + '</td>' +
        '<td><span class="result-pill ' + (p.win ? 'win' : 'loss') + '">' + p.result + '</span></td>' +
        '<td class="mono" style="color: var(--text-dim);">' + p.time + '</td>' +
        '</tr>';
    }).join('');

    var creatorEl = document.getElementById('md-creator');
    var creatorUser = USER_DATA[model.creator];
    if (creatorUser) {
      creatorEl.innerHTML =
        '<a class="creator-card" href="pages.html?page=profile&id=' + model.creator + '&from=model-' + id + '">' +
          '<div class="creator-avatar ' + creatorUser.role + '">' + creatorUser.initials + '</div>' +
          '<div class="creator-info">' +
            '<div class="name">' + creatorUser.username + '</div>' +
            '<div class="role">' + (creatorUser.role === 'researcher' ? 'Researcher' : 'Trader') + '</div>' +
          '</div>' +
          '<div class="creator-arrow">&rarr;</div>' +
        '</a>';
    } else {
      creatorEl.innerHTML =
        '<div class="creator-card" style="cursor: default;">' +
          '<div class="creator-avatar researcher">Y</div>' +
          '<div class="creator-info"><div class="name">You</div><div class="role">Researcher</div></div>' +
        '</div>';
    }

    var useBtn = document.getElementById('md-use-btn');
    useBtn.href = 'index.html?action=signals&model=' + encodeURIComponent(model.name) + '&rank=' + model.rank;

    var metaEl = document.getElementById('md-meta');
    metaEl.innerHTML =
      '<div class="sidebar-meta-row"><span class="label">Horizon</span><span class="value">' + model.horizon + '</span></div>' +
      '<div class="sidebar-meta-row"><span class="label">Target</span><span class="value">' + model.target + '</span></div>' +
      '<div class="sidebar-meta-row"><span class="label">Asset</span><span class="value">' + model.assetLabel + '</span></div>' +
      '<div class="sidebar-meta-row"><span class="label">Created</span><span class="value">' + model.createdAt + '</span></div>';

    showScreen('screen-model-detail');
  }

  // ==================== PROFILE ====================
  function showProfile(id) {
    var user = USER_DATA[id];
    if (!user) { window.location.href = 'index.html'; return; }

    document.title = user.username + ' — Insignia';

    var headerEl = document.getElementById('pf-header');
    headerEl.innerHTML =
      '<div class="profile-avatar ' + user.role + '">' + user.initials + '</div>' +
      '<div class="profile-info">' +
        '<h1>' + user.username + '</h1>' +
        '<span class="role-badge ' + user.role + '">' + (user.role === 'researcher' ? 'Researcher' : 'Trader') + '</span>' +
        '<div class="profile-bio">' + user.bio + '</div>' +
      '</div>';

    var statsEl = document.getElementById('pf-stats');
    statsEl.innerHTML = user.stats.map(function(s) {
      return '<div class="stat-card"><label>' + s.label + '</label><div class="stat-value ' + s.color + '">' + s.value + '</div></div>';
    }).join('');

    var modelsEl = document.getElementById('pf-models');
    modelsEl.innerHTML = user.models.map(function(m) {
      return '<a class="model-list-item" href="pages.html?page=model&id=' + m.id + '&from=profile-' + id + '">' +
        '<div class="model-list-name">' +
          '<span class="model-rank-badge' + (m.rank === 1 ? ' gold' : '') + '">#' + m.rank + '</span>' +
          m.name +
        '</div>' +
        '<div class="model-list-stats">' +
          '<span class="green">' + m.accuracy + '</span>' +
          '<span class="accent">' + m.sharpe + '</span>' +
        '</div>' +
      '</a>';
    }).join('');

    var activityEl = document.getElementById('pf-activity');
    activityEl.innerHTML = user.activity.map(function(a) {
      return '<div class="activity-item">' +
        '<div class="activity-dot ' + a.dot + '"></div>' +
        '<div><div class="activity-text">' + a.text + '</div><div class="activity-time">' + a.time + '</div></div>' +
      '</div>';
    }).join('');

    var backLink = document.getElementById('profile-back-link');
    var params = getParams();
    if (params.from && params.from.startsWith('model-')) {
      var modelId = params.from.replace('model-', '');
      backLink.href = 'pages.html?page=model&id=' + modelId;
      backLink.innerHTML = '&larr; Back to Model';
    } else {
      backLink.href = 'index.html';
      backLink.innerHTML = '&larr; Back to Home';
    }

    showScreen('screen-profile');
  }

  // ==================== INIT ====================
  (function init() {
    var params = getParams();
    if (params.page === 'model' && params.id) {
      showModelDetail(params.id);
    } else if (params.page === 'profile' && params.id) {
      showProfile(params.id);
    } else {
      window.location.href = 'index.html';
    }
  })();
</script>
