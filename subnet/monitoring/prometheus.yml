global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "insignia-tuning"
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          app: "insignia"
          component: "tuning"

  - job_name: "insignia-validator"
    static_configs:
      - targets: ["host.docker.internal:8001"]
        labels:
          app: "insignia"
          component: "validator"
